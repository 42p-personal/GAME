function draw(canvas, grid, pal, px, elder) {
  const n = grid.length
  canvas.width = n * px
  canvas.height = n * px
  const ctx = canvas.getContext('2d')
  grid.forEach((row, y) => {
    for (let x = 0; x < row.length; x++) {
      const ch = row[x]
      if (ch === '.') continue
      ctx.fillStyle = pal[ch]
      ctx.fillRect(x * px, y * px, px, px)
    }
  })
  if (elder) canvas.style.filter = 'grayscale(0.55) brightness(0.75) saturate(0.6)'
}

const rowsEl = document.getElementById('rows')
for (const [id, stages] of Object.entries(SPECIES_SPRITES)) {
  const pal = SPECIES_PALETTE[id]
  const row = document.createElement('div')
  row.className = 'row'
  const label = document.createElement('div')
  label.textContent = id
  row.appendChild(label)
  for (const [name, grid, elder] of [['child', stages.child, false], ['teen', stages.teen, false], ['adult', stages.adult, false], ['elder', stages.adult, true]]) {
    const cell = document.createElement('div')
    cell.className = 'cell'
    const canvas = document.createElement('canvas')
    draw(canvas, grid, pal, 5, elder)
    cell.appendChild(canvas)
    const l = document.createElement('div')
    l.textContent = name
    cell.appendChild(l)
    row.appendChild(cell)
  }
  rowsEl.appendChild(row)
}
